[run]
name = "tdl-parity-smoke"
seed = 700000

[value]
preset = "tdl-8x6-kmatsuzaki"
optimistic_init = 320000.0
multistage = false

[trainer]
mode = "tdl-forward-td"
games = 20000
progress_interval_games = 5000
alpha = 0.1
learning_mode = "td"
fast_path = true
checkpoints = [20000]

[eval]
mode = "tdl-best"
games = 100
parity_tolerance = 0.15
reference_cache = "artifacts/tdl-reference-cache.csv"

[artifacts]
dir = "artifacts/tdl-parity-smoke"
