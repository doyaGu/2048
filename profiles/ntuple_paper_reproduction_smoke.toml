[run]
name = "ntuple-paper-reproduction-smoke"
seed = 700000

[selection]
metric = "average-score"
target_tile = 0
confidence_z = 0.0
confirm_games = 0

[search]
agent = "expectimax"
eval_agent = "expectimax"
depth = 1
time_budget_ms = 0
fixed_ply = true
eval_depth = 1
eval_time_budget_ms = 0
eval_games = 1
eval_interval = 2
progress_interval_games = 2
final_games = 1
eval_threads = 1

[search.downgrade]
enabled = false
mode = "root"
steps = 1
floor_rank = 0

[value]
preset = "compact-d4"
optimistic_init = 320000.0
multistage = false
stage_boundaries = [4]

[value.storage]
mode = "dense-stage"

[artifacts]
dir = "artifacts/ntuple-paper-reproduction-smoke"

[matrix]
seeds = [700000]
priors = [0.0]

[[phases]]
name = "stage0-otd"
games = 4
learning_mode = "optimistic-td"
