[run]
name = "tdl-forward-10m"
seed = 700000

[value]
preset = "tdl-8x6-kmatsuzaki"
optimistic_init = 320000.0
multistage = false

[trainer]
mode = "tdl-forward-td"
games = 10000000
progress_interval_games = 50000
alpha = 0.1
learning_mode = "td"
checkpoints = [1000000, 3000000, 10000000]

[eval]
mode = "tdl-best"
games = 1000

[artifacts]
dir = "artifacts/tdl-forward-10m"
