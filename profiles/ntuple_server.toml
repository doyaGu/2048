[run]
name = "ntuple-paper-stage"
seed = 700000

[selection]
metric = "average-score"
target_tile = 0
confidence_z = 1.0
confirm_games = 300

[search]
agent = "expectimax"
eval_agent = "expectimax"
depth = 3
time_budget_ms = 50
eval_depth = 1
eval_time_budget_ms = 5
eval_games = 100
eval_interval = 50000
final_games = 100
eval_threads = 4

[search.downgrade]
enabled = true
mode = "root"
steps = 1
floor_rank = 0

[value]
preset = "tdl-8x6-kmatsuzaki"
optimistic_init = 320000.0
multistage = true
stage_boundaries = [14]

[value.storage]
mode = "dense-stage"

[artifacts]
dir = "artifacts/ntuple-paper-stage"

[matrix]
seeds = [700000]
priors = [0.0]

[[phases]]
name = "stage0-otd-0p1"
games = 450000
learning_mode = "optimistic-td"
alpha = 0.1
final_alpha = 0.1
epsilon = 0.0
final_epsilon = 0.0
prior_weight = 0.0

